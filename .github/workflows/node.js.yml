# This workflow builds on Node LTS and tests the built artifact across multiple Node versions.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup pnpm package manager
        uses: pnpm/action-setup@v4
        with:
          version: 10.33
      - name: Use Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: geosearch-core-dist
          path: packages/geosearch-core/dist/js/

  test:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Setup pnpm package manager
        uses: pnpm/action-setup@v4
        with:
          version: 10.33
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: geosearch-core-dist
          path: packages/geosearch-core/dist/js/
      - name: Test dist
        run: pnpm --filter @opencage/geosearch-core test:dist
